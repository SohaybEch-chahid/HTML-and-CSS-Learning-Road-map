<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>HTML Span Examples</title>

  <style>
    .red {
      color: red;
    }

    .green {
      color: green;
    }

    .blue {
      color: blue;
    }

    .highlight {
      background-color: yellow;
      font-weight: bold;
    }

    .big {
      font-size: 24px;
    }
  </style>
</head>

<body>
  <h1>HTML Span Examples</h1>

  <!-- Basic Span -->
  <p>My name is <span>Sohayb</span>.</p>

  <hr />

  <!-- Colored Span -->
  <p>
    My name is
    <span class="red">Sohayb</span>.
  </p>

  <hr />

  <!-- Multiple Spans -->
  <p>
    <span class="red">Red</span>
    <span class="green">Green</span>
    <span class="blue">Blue</span>
  </p>

  <hr />

  <!-- Highlighting Words -->
  <p>
    I am learning
    <span class="highlight">HTML</span>
    and
    <span class="highlight">CSS</span>.
  </p>

  <hr />

  <!-- Changing Font Size -->
  <p>
    Normal Text
    <span class="big">Big Text</span>
    Normal Text
  </p>

  <hr />

  <!-- Real Example -->
  <p>
    Welcome to
    <span class="highlight">my website</span>.
  </p>

  <p>Water Formula: H<sub>2</sub>O</p>

  <p>Math Formula: x<sup>2</sup></p>
</body>

</html>
