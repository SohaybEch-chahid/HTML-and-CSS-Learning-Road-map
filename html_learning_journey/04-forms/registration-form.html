<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

<h1>Registration Form</h1>

<form>

    <label>Full Name</label>
    <br>
    <input
        type="text"
        required
        minlength="3">

    <br><br>

    <label>Email</label>
    <br>
    <input
        type="email"
        required>

    <br><br>

    <label>Password</label>
    <br>
    <input
        type="password"
        minlength="8"
        required>

    <br><br>

    <label>Age</label>
    <br>
    <input
        type="number"
        min="18"
        max="100">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
