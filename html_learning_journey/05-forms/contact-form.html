<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Contact Form</title>
</head>

<body>
  <h1>Contact Us</h1>

  <form>
    <label>Name</label>
    <br />
    <input type="text" required />

    <br /><br />

    <label>Email</label>
    <br />
    <input type="email" required />

    <br /><br />

    <label>Message</label>
    <br />
    <textarea rows="5" cols="30"></textarea>

    <br /><br />

    <button type="submit">Send</button>
  </form>
</body>

</html>
