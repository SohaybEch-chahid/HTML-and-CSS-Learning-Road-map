<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Basic Form</title>
</head>

<body>
  <h1>Basic Form</h1>

  <form>
    <label for="Name">Name:</label>
    <input type="text" id="Name" minlength="3" maxlength="25" required />

    <br /><br />

    <label>Email:</label>
    <input type="email" placeholder="add @" required />

    <br /><br />

    <button type="submit">Submit</button><br />
    <input type="reset" />
  </form>
</body>

</html>
