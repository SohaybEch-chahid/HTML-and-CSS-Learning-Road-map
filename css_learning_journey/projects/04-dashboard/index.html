<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Dashboard</h2>

      <ul>
        <li>📊 Overview</li>
        <li>👤 Users</li>
        <li>💰 Revenue</li>
        <li>⚙️ Settings</li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <h1>Analytics Overview</h1>

      <!-- Cards -->
      <div class="cards">
        <div class="card">
          <h3>Users</h3>
          <p>1,240</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$12,400</p>
        </div>

        <div class="card">
          <h3>Sales</h3>
          <p>320</p>
        </div>

        <div class="card">
          <h3>Growth</h3>
          <p>+24%</p>
        </div>
      </div>

      <!-- Table Section -->
      <div class="table-section">
        <h2>Recent Users</h2>

        <table>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Status</th>
          </tr>

          <tr>
            <td>Alice</td>
            <td>alice@mail.com</td>
            <td>Active</td>
          </tr>

          <tr>
            <td>Bob</td>
            <td>bob@mail.com</td>
            <td>Inactive</td>
          </tr>
        </table>
      </div>
    </main>
  </div>
</body>

</html>
